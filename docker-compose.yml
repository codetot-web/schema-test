services:
  schema-test:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      # Bearer token for API auth (recommended for production)
      # Usage: BEARER_TOKEN=*** docker compose up -d
      - BEARER_TOKEN=${BEARER_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
