<!DOCTYPE html>
<html>
<head>
  <title>Graph Structure Test</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Product",
        "name": "Widget Pro",
        "offers": {
          "@type": "Offer",
          "price": "29.99",
          "priceCurrency": "USD"
        }
      },
      {
        "@type": "Organization",
        "name": "WidgetCorp",
        "url": "https://example.com"
      },
      {
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://example.com"
          }
        ]
      }
    ]
  }
  </script>
</head>
<body></body>
</html>
