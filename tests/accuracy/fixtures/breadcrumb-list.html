<!DOCTYPE html>
<html>
<head>
  <title>Breadcrumb List Test</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://example.com/"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "Products",
        "item": "https://example.com/products"
      },
      {
        "@type": "ListItem",
        "position": 3,
        "name": "Widget Pro",
        "item": "https://example.com/products/widget-pro"
      }
    ]
  }
  </script>
</head>
<body>
  <nav>
    <a href="/">Home</a> &gt;
    <a href="/products">Products</a> &gt;
    <span>Widget Pro</span>
  </nav>
</body>
</html>
