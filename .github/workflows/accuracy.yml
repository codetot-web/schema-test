name: Accuracy Check
on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM
  workflow_dispatch: {}

jobs:
  accuracy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:accuracy
      - name: Generate accuracy report
        run: npm run accuracy-report
      - name: Check accuracy threshold
        run: |
          ACCURACY=$(cat accuracy-report.json | jq '.overall')
          if (( $(echo "$ACCURACY < 95" | bc -l) )); then
            echo "Accuracy dropped below 95%: $ACCURACY%"
            exit 1
          fi
          echo "Accuracy: $ACCURACY%"
      - name: Upload report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: accuracy-report
          path: accuracy-report.json
